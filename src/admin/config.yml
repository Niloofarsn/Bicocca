# Decap CMS configuration for the Harmonic Analysis @ Bicocca website.
# Editing happens through forms here; saving commits to the Git repository,
# which triggers a rebuild on Netlify.

backend:
  name: git-gateway
  branch: main # change if your default branch is named differently

# Lets you run the CMS locally with `npm run cms` (decap-server) before going live.
local_backend: true

media_folder: "src/assets/img"
public_folder: "/assets/img"

# Translatable fields use explicit "English" / "Italian" inputs, side by side.
collections:
  # ---------- Single-instance settings ----------
  - name: "settings"
    label: "Workshop settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "General information"
        file: "src/_data/site.json"
        fields:
          - label: "Title"
            name: "title"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Italian", name: "it", widget: "string" }
          - { label: "Short title (header/footer)", name: "shortTitle", widget: "string" }
          - label: "Dates"
            name: "dates"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Italian", name: "it", widget: "string" }
          - label: "Location"
            name: "location"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Italian", name: "it", widget: "string" }
          - label: "Tagline"
            name: "tagline"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "text" }
              - { label: "Italian", name: "it", widget: "text" }
          - { label: "Contact emails", name: "contactEmails", widget: "list", field: { label: "Email", name: "email", widget: "string" } }
          - label: "Organizers"
            name: "organizers"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Affiliation", name: "affiliation", widget: "string" }

      - name: "home"
        label: "Home page"
        file: "src/_data/home.json"
        fields:
          - { label: "Poster image", name: "poster", widget: "image", required: false }
          - label: "Poster alt text"
            name: "posterAlt"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Italian", name: "it", widget: "string" }
          - { label: "Description (English)", name: "description_en", widget: "markdown" }
          - { label: "Description (Italian)", name: "description_it", widget: "markdown" }

      - name: "venue"
        label: "Venue page"
        file: "src/_data/venue.json"
        fields:
          - { label: "Venue name", name: "venueName", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - label: "Room"
            name: "room"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Italian", name: "it", widget: "string" }
          - { label: "Map embed URL (iframe)", name: "mapEmbed", widget: "string", required: false }
          - { label: "Map link (opens in maps)", name: "mapLink", widget: "string", required: false }
          - { label: "Getting there (English)", name: "gettingThere_en", widget: "markdown" }
          - { label: "Getting there (Italian)", name: "gettingThere_it", widget: "markdown" }

      - name: "labels"
        label: "Page texts & labels"
        file: "src/_data/i18n.json"
        description: "All page titles, intros and section headings (English / Italian)."
        fields:
          - label: "Navigation"
            name: "nav"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Home", name: "home", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
              - { label: "Programme", name: "programme", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
              - { label: "Participants", name: "participants", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
              - { label: "Venue", name: "venue", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
          - label: "Home page"
            name: "home"
            widget: "object"
            collapsed: true
            fields:
              - { label: "About heading", name: "about", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
              - { label: "Organizers heading", name: "organizers", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
              - { label: "Contact heading", name: "contact", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
          - label: "Programme page"
            name: "programme"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Title", name: "title", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
              - { label: "Intro", name: "intro", widget: "object", fields: [{ label: English, name: en, widget: text }, { label: Italian, name: it, widget: text }] }
              - { label: "“Day” word", name: "day", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
              - { label: "Abstracts heading", name: "abstracts", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
              - { label: "Abstracts placeholder", name: "abstractsPlaceholder", widget: "object", fields: [{ label: English, name: en, widget: text }, { label: Italian, name: it, widget: text }] }
              - { label: "“To be announced”", name: "tba", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
          - label: "Participants page"
            name: "participants"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Title", name: "title", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
              - { label: "Intro", name: "intro", widget: "object", fields: [{ label: English, name: en, widget: text }, { label: Italian, name: it, widget: text }] }
              - { label: "Empty message", name: "empty", widget: "object", fields: [{ label: English, name: en, widget: text }, { label: Italian, name: it, widget: text }] }
              - label: "Role labels"
                name: "roles"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Speaker", name: "speaker", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
                  - { label: "Organizer", name: "organizer", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
                  - { label: "Participant", name: "participant", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
          - label: "Venue page"
            name: "venue"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Title", name: "title", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
              - { label: "“Where” heading", name: "where", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
              - { label: "“Getting there” heading", name: "gettingThere", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
              - { label: "“Practical information” heading", name: "practical", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
              - { label: "“Open in map” link", name: "openMap", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
              - { label: "Empty message", name: "empty", widget: "object", fields: [{ label: English, name: en, widget: text }, { label: Italian, name: it, widget: text }] }
              - label: "Category headings"
                name: "categories"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Accommodation", name: "hotel", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
                  - { label: "Dinners & food", name: "dinner", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
                  - { label: "Transport", name: "transport", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
                  - { label: "Other", name: "other", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }
          - label: "Footer"
            name: "footer"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Footer title", name: "rights", widget: "object", fields: [{ label: English, name: en, widget: string }, { label: Italian, name: it, widget: string }] }

  # ---------- Programme (one entry per session) ----------
  - name: "programme"
    label: "Programme"
    label_singular: "Session"
    folder: "src/programme"
    extension: "md"
    format: "yaml-frontmatter"
    create: true
    slug: "day{{fields.day}}-{{start}}-{{slug}}"
    summary: "Day {{fields.day}} · {{start}} · {{title_en}}"
    sortable_fields: ["day", "start"]
    fields:
      - { label: "Day (1–3)", name: "day", widget: "number", value_type: "int", min: 1, max: 3, default: 1 }
      - { label: "Date label", name: "dateLabel", widget: "string", hint: "e.g. 23 September 2026" }
      - { label: "Start time", name: "start", widget: "string", hint: "e.g. 09:30" }
      - { label: "End time", name: "end", widget: "string", required: false }
      - label: "Type"
        name: "type"
        widget: "select"
        default: "talk"
        options:
          - { label: "Talk", value: "talk" }
          - { label: "Break", value: "break" }
          - { label: "Lunch", value: "lunch" }
          - { label: "Registration", value: "registration" }
      - { label: "Speaker", name: "speaker", widget: "string", required: false }
      - { label: "Affiliation", name: "affiliation", widget: "string", required: false }
      - { label: "Talk title (English)", name: "title_en", widget: "string", required: false }
      - { label: "Talk title (Italian)", name: "title_it", widget: "string", required: false }

  # ---------- Participants ----------
  - name: "participants"
    label: "Participants"
    label_singular: "Participant"
    folder: "src/participants"
    extension: "md"
    format: "yaml-frontmatter"
    create: true
    slug: "{{slug}}"
    summary: "{{name}} — {{affiliation}}"
    sortable_fields: ["name"]
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Affiliation", name: "affiliation", widget: "string", required: false }
      - label: "Role"
        name: "role"
        widget: "select"
        default: "participant"
        options:
          - { label: "Speaker", value: "speaker" }
          - { label: "Organizer", value: "organizer" }
          - { label: "Participant", value: "participant" }
      - { label: "Homepage (optional)", name: "url", widget: "string", required: false }

  # ---------- Abstracts (placeholder; add entries later) ----------
  - name: "abstracts"
    label: "Abstracts"
    label_singular: "Abstract"
    folder: "src/abstracts"
    extension: "md"
    format: "yaml-frontmatter"
    create: true
    slug: "{{slug}}"
    summary: "{{speaker}} — {{title_en}}"
    fields:
      - { label: "Speaker", name: "speaker", widget: "string" }
      - { label: "Affiliation", name: "affiliation", widget: "string", required: false }
      - { label: "Title (English)", name: "title_en", widget: "string" }
      - { label: "Title (Italian)", name: "title_it", widget: "string", required: false }
      - { label: "Abstract (English)", name: "abstract_en", widget: "markdown" }
      - { label: "Abstract (Italian)", name: "abstract_it", widget: "markdown", required: false }

  # ---------- Practical information (hotels, dinners, transport...) ----------
  - name: "practical"
    label: "Practical info"
    label_singular: "Item"
    folder: "src/practical"
    extension: "md"
    format: "yaml-frontmatter"
    create: true
    slug: "{{category}}-{{slug}}"
    summary: "{{category}} · {{title}}"
    sortable_fields: ["category", "order"]
    fields:
      - label: "Category"
        name: "category"
        widget: "select"
        default: "other"
        options:
          - { label: "Accommodation", value: "hotel" }
          - { label: "Dinners & food", value: "dinner" }
          - { label: "Transport", value: "transport" }
          - { label: "Other", value: "other" }
      - { label: "Order", name: "order", widget: "number", value_type: "int", default: 1 }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Address (optional)", name: "address", widget: "string", required: false }
      - { label: "Link (optional)", name: "url", widget: "string", required: false }
      - { label: "Details (English)", name: "body_en", widget: "markdown" }
      - { label: "Details (Italian)", name: "body_it", widget: "markdown", required: false }
